name: Build Citadelle ItemsBlocker

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 27
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew clean build --stacktrace
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/.gradle

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: citadelle-itemsblocker-build
          path: build/libs/
          retention-days: 5

      - name: Check build outputs
        run: ls -la build/libs/

      # --- Upload to Cloudflare R2 ---
      - uses: ryand56/r2-upload-action@latest
        name: Upload R2
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET_NAME }}
          source-dir: build/libs/Citadelle-ItemsBlocker.jar
          destination-dir: administration/paper-plugin/